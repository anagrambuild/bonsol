name: Sync Prover to S3
on:
  push:
    tags:
      - "*"
  workflow_dispatch:
# Allow one concurrent deployment
concurrency:
  group: "sync-prover-to-s3-${{ github.ref }}"
  cancel-in-progress: true
env:
  S3_BUCKET_NAME: "bonsol-risc0-prover-us-east-1-041119533185"
  AWS_REGION: "us-east-1"
  PROVER_TAG: "v2024-05-17.1"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build Prover Artifact
        run: |
          docker build -f ../docker/Dockerfile.prover -o risc0-groth16-prover . --arg PROVER_TAG=${PROVER_TAG}
      - name: Sync S3 Bucket
        run: |
          aws s3 sync ./risc0-groth16-prover s3://${S3_BUCKET_NAME} --delete --region ${{ env.AWS_REGION }}
